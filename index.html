<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️ ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            padding: 16px;
        }
        .video-card {
            max-width: 420px;
            width: 100%;
            background: linear-gradient(145deg, #1e1722, #2a1f2e);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 200, 220, 0.15);
            padding: 24px 20px 30px;
            transition: all 0.3s ease;
            backdrop-filter: blur(2px);
        }
        .screen {
            background: #120c14;
            border-radius: 32px;
            padding: 12px 12px 20px;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.7), 0 0 0 1px #3a2a3e;
            position: relative;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 9 / 16;
            background: radial-gradient(circle at 30% 20%, #2a1a2e, #0d070f);
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            touch-action: none;
            cursor: pointer;
        }
        .video-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            padding: 0 8px;
        }
        .play-btn {
            background: #ff4d7a;
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 10px 24px;
            border-radius: 60px;
            box-shadow: 0 6px 0 #a1324e, 0 8px 18px rgba(255, 70, 120, 0.35);
            letter-spacing: 1px;
            transition: all 0.12s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #ff4d7a, #e63e6b);
            flex: 1;
            justify-content: center;
        }
        .play-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #a1324e, 0 8px 18px rgba(255, 70, 120, 0.4);
        }
        .play-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
        .timer {
            color: #c9b0d4;
            font-size: 0.9rem;
            background: #221b26;
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #3d2c44;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
            margin-left: 12px;
            white-space: nowrap;
        }
        .love-msg {
            text-align: center;
            margin: 12px 0 2px;
            color: #f2d9ff;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-shadow: 0 0 12px #ff77aa80;
            opacity: 0.9;
            font-weight: 300;
        }
        .love-msg strong {
            font-weight: 600;
            color: #ff9ecb;
        }
        .footer-note {
            color: #6a5a70;
            text-align: center;
            font-size: 0.7rem;
            margin-top: 14px;
            letter-spacing: 1px;
            border-top: 1px dashed #352b3a;
            padding-top: 14px;
        }
        .footer-note span {
            color: #ff7ca8;
        }
        @media (max-width: 480px) {
            .video-card { padding: 16px 12px 20px; }
            .play-btn { font-size: 1rem; padding: 8px 16px; }
            .timer { font-size: 0.8rem; padding: 4px 12px; }
        }
    </style>
</head>
<body>
<div class="video-card">
    <div class="screen">
        <!-- 画布：表白视频核心 -->
        <canvas id="loveCanvas" width="360" height="640"></canvas>
        <!-- 轻触播放提示 (装饰) -->
        <div style="position: absolute; bottom: 30px; left: 0; right: 0; text-align: center; pointer-events: none; opacity: 0.4; color: #b392c0; font-size: 0.7rem; letter-spacing: 2px;">
            ❤️ 点击画面 / 按钮播放 ❤️
        </div>
    </div>

    <div class="video-controls">
        <button class="play-btn" id="playBtn">
            <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
            <span id="playLabel">播放</span>
        </button>
        <div class="timer" id="timerDisplay">00:00</div>
    </div>
    <div class="love-msg">
        ✦ <strong>楚炎</strong> · 你是我的整个宇宙 ✦
    </div>
    <div class="footer-note">
        <span>♥</span> 给楚炎 · 专属表白 <span>♥</span>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('loveCanvas');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('playBtn');
        const playLabel = document.getElementById('playLabel');
        const timerDisplay = document.getElementById('timerDisplay');

        // ---------- 尺寸 ----------
        const W = 360, H = 640;
        canvas.width = W; canvas.height = H;

        // ---------- 核心参数 ----------
        let isPlaying = false;
        let animationId = null;
        let startTime = 0;          // 播放开始的时间戳
        let elapsedSeconds = 0;     // 当前播放进度 (秒)
        const TOTAL_DURATION = 45;   // 总时长45秒 (循环)

        // ---------- 粒子系统 (爱心) ----------
        const particles = [];
        const PARTICLE_COUNT = 90;

        // 颜色调色板 (暖色/粉/红)
        const palette = [
            '#ff4d7a', '#ff6b8a', '#ff8aa8', '#ffa8c2', '#ffc0d5',
            '#f55a7a', '#e8436a', '#d63a5e', '#ff2e63', '#ff4777'
        ];

        class Particle {
            constructor() {
                this.reset(true);
            }
            reset(init = false) {
                // 位置: 主要分布在画布中下部，但也会散落
                this.x = Math.random() * W;
                this.y = init ? Math.random() * H : -10 - Math.random() * 40;
                // 大小
                this.size = 4 + Math.random() * 12;
                // 速度 (飘落 + 左右摇摆)
                this.speedY = 0.6 + Math.random() * 1.2;
                this.speedX = (Math.random() - 0.5) * 0.8;
                this.phase = Math.random() * Math.PI * 2;
                this.amp = 0.6 + Math.random() * 1.2;
                // 颜色
                this.color = palette[Math.floor(Math.random() * palette.length)];
                // 透明度 & 闪烁
                this.opacity = 0.7 + Math.random() * 0.3;
                this.twinkleSpeed = 0.02 + Math.random() * 0.05;
                // 形状: 0=圆形, 1=心形小图标 (简化: 都用圆，但可绘制爱心)
                this.type = Math.random() > 0.4 ? 'heart' : 'circle';
                // 旋转 (用于心形)
                this.rotation = Math.random() * Math.PI * 2;
                this.scale = 0.8 + Math.random() * 0.6;
            }
            update() {
                // 飘落
                this.y += this.speedY * 0.6;
                this.x += Math.sin(this.phase + Date.now() * 0.001) * this.amp * 0.4;
                // 边界重置 (掉到底部或超出左右)
                if (this.y > H + 30) {
                    this.reset(false);
                    this.y = -10 - Math.random() * 30;
                }
                if (this.x < -20) this.x = W + 20;
                if (this.x > W + 20) this.x = -20;
                // 透明度微变
                this.opacity = 0.7 + 0.3 * Math.sin(Date.now() * this.twinkleSpeed + this.phase);
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity * 0.9;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                const s = this.size * this.scale * 0.6;
                // 绘制爱心或圆
                if (this.type === 'heart') {
                    this.drawHeart(ctx, s);
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.9, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 18;
                    ctx.fill();
                }
                ctx.restore();
            }
            drawHeart(ctx, size) {
                const s = size * 0.8;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.moveTo(0, s * 0.3);
                ctx.bezierCurveTo(-s * 0.8, -s * 0.3, -s * 0.5, -s * 0.9, 0, -s * 0.6);
                ctx.bezierCurveTo(s * 0.5, -s * 0.9, s * 0.8, -s * 0.3, 0, s * 0.3);
                ctx.closePath();
                ctx.fill();
            }
        }

        // 初始化粒子
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        // ---------- 绘制背景 + 文字 + 特效 ----------
        function drawScene(progress) {
            // 清空
            ctx.clearRect(0, 0, W, H);

            // ----- 1. 背景渐变 (浪漫紫红) -----
            const grad = ctx.createRadialGradient(140, 200, 40, 200, 400, 500);
            grad.addColorStop(0, '#341a2e');
            grad.addColorStop(0.5, '#1f0f1d');
            grad.addColorStop(1, '#0a0509');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // 柔和光晕
            ctx.globalAlpha = 0.2;
            const grd2 = ctx.createRadialGradient(200, 300, 10, 180, 350, 300);
            grd2.addColorStop(0, '#ff719a');
            grd2.addColorStop(1, 'transparent');
            ctx.fillStyle = grd2;
            ctx.fillRect(0, 0, W, H);
            ctx.globalAlpha = 1.0;

            // ----- 2. 更新并绘制所有粒子 (爱心) -----
            for (let p of particles) {
                p.update();
                p.draw(ctx);
            }

            // ----- 3. 额外飘动的大爱心 (点缀) -----
            ctx.save();
            const bigHeartX = W/2 + 20 * Math.sin(Date.now() * 0.0012);
            const bigHeartY = 140 + 15 * Math.sin(Date.now() * 0.0008 + 1);
            ctx.translate(bigHeartX, bigHeartY);
            ctx.scale(1.2 + 0.2 * Math.sin(Date.now() * 0.002), 1.2 + 0.2 * Math.sin(Date.now() * 0.002 + 0.5));
            ctx.shadowColor = '#ff4d7a';
            ctx.shadowBlur = 40;
            ctx.fillStyle = 'rgba(255, 80, 130, 0.25)';
            ctx.beginPath();
            ctx.moveTo(0, 12);
            ctx.bezierCurveTo(-30, -16, -18, -40, 0, -28);
            ctx.bezierCurveTo(18, -40, 30, -16, 0, 12);
            ctx.fill();
            ctx.restore();

            // ----- 4. 文字层 (表白) -----
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // 主标题 "楚炎"
            ctx.shadowColor = '#ff3f6f';
            ctx.shadowBlur = 32;
            ctx.fillStyle = '#fff0f5';
            ctx.font = 'bold 48px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif';
            ctx.fillText('楚炎', W/2, 340);

            // 副标题 (动态)
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#ffb0ca';
            ctx.font = '22px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif';
            ctx.fillText('✨ 楚炎 · 一万块钱来咯 ✨', W/2, 410);

            // 英文 / 小语
            ctx.shadowBlur = 12;
            ctx.fillStyle = '#ddb6d9';
            ctx.font = '16px "Segoe UI", cursive';
            ctx.fillText('♥  You are my gravity  ♥', W/2, 470);

            // 根据进度显示不同情话 (滚动)
            let loveLine = '';
            const p = progress % 1;
            if (p < 0.15) loveLine = '第一次见你，星河都黯淡';
            else if (p < 0.30) loveLine = '你的笑，是我最想留住的风景';
            else if (p < 0.45) loveLine = '想牵你的手，从心动到古稀';
            else if (p < 0.60) loveLine = '楚炎，做我的女朋友好吗？';
            else if (p < 0.75) loveLine = '我会一直一直喜欢你 ✨';
            else if (p < 0.90) loveLine = '余生都是你，楚炎';
            else loveLine = '💖 我爱你 💖';

            ctx.shadowBlur = 18;
            ctx.fillStyle = '#f5d0e8';
            ctx.font = '20px "PingFang SC", "Microsoft YaHei", sans-serif';
            ctx.fillText(loveLine, W/2, 540);

            // 底部小爱心符号
            ctx.shadowBlur = 8;
            ctx.fillStyle = '#ff93b3';
            ctx.font = '18px sans-serif';
            ctx.fillText('❤️  ❤️  ❤️', W/2, 600);

            // 闪光星星 (随进度)
            for (let i=0; i<6; i++) {
                const angle = Date.now() * 0.001 + i * 1.2;
                const rx = 80 + 40 * Math.sin(angle);
                const ry = 120 + 30 * Math.cos(angle * 0.7);
                ctx.globalAlpha = 0.3 + 0.3 * Math.sin(angle * 2);
                ctx.fillStyle = '#fff9c0';
                ctx.shadowBlur = 28;
                ctx.beginPath();
                ctx.arc(rx, ry, 2 + Math.sin(angle)*1.5, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // ---------- 动画循环 ----------
        function animate() {
            if (!isPlaying) return;

            // 计算经过时间 (秒)
            const now = Date.now();
            let diff = (now - startTime) / 1000;
            // 循环
            if (diff >= TOTAL_DURATION) {
                // 重置循环，但保留进度
                diff = diff % TOTAL_DURATION;
                startTime = now - diff * 1000;
            }
            elapsedSeconds = diff;
            const progress = diff / TOTAL_DURATION;

            // 更新画面
            drawScene(progress);

            // 更新时间显示
            const mins = Math.floor(diff / 60);
            const secs = Math.floor(diff % 60);
            timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

            // 继续下一帧
            animationId = requestAnimationFrame(animate);
        }

        // ---------- 播放/暂停 ----------
        function togglePlay() {
            if (isPlaying) {
                // 暂停
                isPlaying = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                playLabel.textContent = '播放';
                // 暂停时保留画面
            } else {
                // 播放
                isPlaying = true;
                // 如果是从暂停恢复，用当前elapsedSeconds调整startTime
                if (startTime === 0) {
                    startTime = Date.now() - elapsedSeconds * 1000;
                } else {
                    // 保持进度
                    startTime = Date.now() - elapsedSeconds * 1000;
                }
                playLabel.textContent = '暂停';
                animate();
            }
        }

        // ---------- 重置到开头 (当播放结束循环时保持连续) ----------
        // 额外: 点击canvas也可以切换
        canvas.addEventListener('click', togglePlay);

        // 按钮切换
        playBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            togglePlay();
        });

        // 初始化：显示第一帧 (未播放)
        drawScene(0);
        timerDisplay.textContent = '00:00';

        // 如果有用户交互后自动开始 (可选)，但我们保留手动点击播放
        // 为了更好体验，在移动端默认显示，用户点击播放

        // 处理页面可见性变化 (暂停/恢复)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isPlaying) {
                // 切到后台暂停 (保持进度)
                isPlaying = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                playLabel.textContent = '播放';
            } else if (!document.hidden && !isPlaying && playLabel.textContent === '暂停') {
                // 回到前台，如果按钮显示“暂停”说明之前是播放状态，但被暂停了，可恢复
                // 但我们更稳健：仅当之前是播放状态才恢复, 可以用一个标志
                // 这里简单处理：如果timer >0 且 按钮文本是暂停，自动恢复？
                // 但是更好的： 我们用变量记录
            }
        });

        // 启动时自动播放？（为了让视频感，不自动播放，让用户点击）
        // 但第一次打开可以显示静态画面，保留
        console.log('💖 楚炎，你的专属表白视频已加载 💖');
    })();
</script>
</body>
</html>
